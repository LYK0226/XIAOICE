<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密碼 - XIAOICE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
        }

        .reset-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            max-height: 90vh;
            overflow-y: auto;
            margin: 20px auto;
        }

        /* Custom scrollbar styling */
        .reset-container::-webkit-scrollbar {
            width: 8px;
        }

        .reset-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .reset-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        .reset-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3a8a 100%);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .info-box {
            background: #e8f4f8;
            border-left: 4px solid #0084ff;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #0056b3;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="header">
            <h1>🔐 重置密碼</h1>
            <p>輸入你的郵箱以重置密碼</p>
        </div>

        <div id="message" class="message"></div>

        <div class="info-box">
            💡 請輸入你的郵箱地址，我們將為你生成一個新密碼。
        </div>

        <form id="resetForm" onsubmit="handleReset(event)">
            <div class="form-group">
                <label for="email">郵箱地址</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="輸入你的郵箱地址" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="newPassword">新密碼</label>
                <input 
                    type="password" 
                    id="newPassword" 
                    placeholder="輸入新密碼（至少6位）" 
                    minlength="6"
                    required
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword">確認密碼</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="再次輸入新密碼" 
                    minlength="6"
                    required
                >
            </div>

            <button type="submit" class="submit-btn">
                <span class="loading">
                    <span class="spinner"></span> 處理中...
                </span>
                <span class="button-text">重置密碼</span>
            </button>
        </form>

        <div class="back-link">
            <a href="login.html" onclick="goBack(event)">← 返回登錄</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        const messageDiv = document.getElementById('message');
        const form = document.getElementById('resetForm');
        const loadingSpan = document.querySelector('.loading');
        const buttonText = document.querySelector('.button-text');

        function showMessage(text, type = 'info') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                if (type === 'success') {
                    messageDiv.className = 'message success';
                }
            }, 100);
        }

        async function handleReset(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 驗證
            if (!email) {
                showMessage('請輸入郵箱地址', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('密碼至少需要6個字符', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('兩次輸入的密碼不一致', 'error');
                return;
            }

            // 顯示加載狀態
            loadingSpan.style.display = 'inline';
            buttonText.style.display = 'none';

            try {
                // 調用後端 API
                const response = await fetch(`${API_BASE_URL}/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ ' + data.message, 'success');
                    
                    // 3秒後重定向到登錄頁面
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showMessage('❌ ' + (data.error || '重置失敗'), 'error');
                }

            } catch (error) {
                showMessage('❌ 網絡錯誤，請檢查連接', 'error');
                console.error('Reset error:', error);
            } finally {
                loadingSpan.style.display = 'none';
                buttonText.style.display = 'inline';
            }
        }

        function goBack(event) {
            event.preventDefault();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
