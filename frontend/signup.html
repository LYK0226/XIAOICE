<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #667eea 100%);
            background-size: 200% 200%;
            animation: gradient 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 90%;
            padding: 50px 40px;
            animation: slideIn 0.6s ease-out;
            max-height: 90vh;
            overflow-y: auto;
            margin: 20px auto;
        }

        /* Custom scrollbar styling */
        .signup-container::-webkit-scrollbar {
            width: 8px;
        }

        .signup-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .signup-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        .signup-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3a8a 100%);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .signup-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .signup-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Email Input Group Styles */
        .email-input-group {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .email-input-group .input-wrapper {
            flex: 1;
        }

        .email-provider-select {
            display: flex;
        }

        .email-provider-select select {
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #f8f9fa;
            color: #333;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .email-provider-select select:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
        }

        .email-provider-select select:hover {
            border-color: #667eea;
        }

        .email-preview {
            font-size: 12px;
            color: #667eea;
            margin-top: 6px;
            padding: 6px 8px;
            background: #f0f4ff;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .email-preview span {
            font-weight: 600;
            color: #333;
        }

        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            transition: background 0.3s ease;
        }

        .strength-bar.weak {
            background: #f44336;
        }

        .strength-bar.medium {
            background: #ff9800;
        }

        .strength-bar.strong {
            background: #4caf50;
        }

        .strength-text {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .terms-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            font-size: 13px;
            color: #666;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .terms-checkbox a {
            color: #667eea;
            text-decoration: none;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .signup-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.6);
        }

        .signup-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .signup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #ccc;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            margin: 0 15px;
            font-size: 13px;
            color: #999;
        }

        .social-signup {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .login-link {
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .error-message {
            display: none;
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            font-size: 13px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            display: none;
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
            font-size: 13px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .signup-container {
                padding: 35px 25px;
                max-width: 100%;
                max-height: 95vh;
            }

            .signup-header h1 {
                font-size: 24px;
            }

            .logo {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <div class="logo">🤖</div>
            <h1>XIAOICE</h1>
            <p>加入我們 / Join Us</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="username">用戶名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="輸入用戶名" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">郵箱</label>
                <div class="email-input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="email" name="email" placeholder="輸入 Gmail 用戶名或完整郵箱" required>
                    </div>
                    <div class="email-provider-select">
                        <select id="emailProvider" name="emailProvider">
                            <option value="gmail.com">Gmail</option>
                            <option value="outlook.com">Outlook</option>
                            <option value="yahoo.com">Yahoo</option>
                            <option value="custom">自定義</option>
                        </select>
                    </div>
                </div>
                <div class="email-preview" id="emailPreview">郵箱: <span id="previewEmail">-</span></div>
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="輸入密碼" required>
                </div>
                <div class="password-strength">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                </div>
                <div class="strength-text" id="strengthText">密碼強度: 弱</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">確認密碼</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="再次輸入密碼" required>
                </div>
            </div>

            <div class="terms-checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">我同意 <a href="#terms">服務條款</a> 和 <a href="#privacy">隱私政策</a></label>
            </div>

            <button type="submit" class="signup-btn" id="signupBtn">
                <span id="signupText">立即註冊</span>
                <div class="loading" id="loading">
                    <span class="spinner"></span>加載中...
                </div>
            </button>
        </form>

        <div class="divider">
            <span>或者</span>
        </div>

        <div class="login-link">
            已有帳戶？<a href="login.html">立即登入</a>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:5000/api';

        const emailInput = document.getElementById('email');
        const emailProvider = document.getElementById('emailProvider');
        const previewEmail = document.getElementById('previewEmail');

        // Update email preview when user types or provider changes
        emailInput.addEventListener('input', updateEmailPreview);
        emailProvider.addEventListener('change', updateEmailPreview);

        function updateEmailPreview() {
            const username = emailInput.value.trim();
            const provider = emailProvider.value;

            if (provider === 'custom') {
                // If custom, show as-is (user must enter full email)
                previewEmail.textContent = username || '-';
            } else {
                // If predefined provider, append domain
                if (username) {
                    // Remove any existing domain if user accidentally added it
                    const cleanUsername = username.split('@')[0];
                    previewEmail.textContent = `${cleanUsername}@${provider}`;
                } else {
                    previewEmail.textContent = '-';
                }
            }
        }

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBars = document.querySelectorAll('.strength-bar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strength = checkPasswordStrength(password);

            // Update strength bars
            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    if (strength === 1) {
                        bar.classList.add('weak');
                    } else if (strength === 2) {
                        bar.classList.add('medium');
                    } else {
                        bar.classList.add('strong');
                    }
                }
            });

            // Update strength text
            const strengthTexts = {
                0: '密碼強度: 弱',
                1: '密碼強度: 弱',
                2: '密碼強度: 中等',
                3: '密碼強度: 強'
            };
            strengthText.textContent = strengthTexts[strength];
        });

        function checkPasswordStrength(password) {
            let strength = 0;

            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) strength++;

            return Math.min(strength, 3);
        }

        function handleSignup(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const emailUsername = emailInput.value.trim();
            const provider = emailProvider.value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const errorMessage = document.getElementById('errorMessage');
            const signupBtn = document.getElementById('signupBtn');
            const signupText = document.getElementById('signupText');
            const loading = document.getElementById('loading');

            // Reset messages
            errorMessage.style.display = 'none';
            errorMessage.textContent = '';

            // Validation
            if (!username) {
                showError('請輸入用戶名');
                return;
            }

            if (username.length < 3) {
                showError('用戶名長度不少於 3 個字符');
                return;
            }

            if (!emailUsername) {
                showError('請輸入郵箱');
                return;
            }

            // Construct full email
            let fullEmail;
            if (provider === 'custom') {
                fullEmail = emailUsername;
                if (!isValidEmail(fullEmail)) {
                    showError('請輸入有效的郵箱地址');
                    return;
                }
            } else {
                // Remove @ symbol if user accidentally added it
                const cleanUsername = emailUsername.split('@')[0];
                if (cleanUsername.length < 3) {
                    showError('用戶名長度不少於 3 個字符');
                    return;
                }
                fullEmail = `${cleanUsername}@${provider}`;
            }

            if (!password) {
                showError('請輸入密碼');
                return;
            }

            if (password.length < 6) {
                showError('密碼長度不少於 6 個字符');
                return;
            }

            if (password !== confirmPassword) {
                showError('兩次輸入的密碼不一致');
                return;
            }

            if (!terms) {
                showError('請同意服務條款和隱私政策');
                return;
            }

            // Simulate loading
            signupBtn.disabled = true;
            signupText.style.display = 'none';
            loading.style.display = 'block';

            // Call API
            callSignupAPI(username, fullEmail, password, confirmPassword, signupBtn, signupText, loading);
        }

        function callSignupAPI(username, email, password, confirmPassword, signupBtn, signupText, loading) {
            const payload = {
                username: username,
                email: email,
                password: password,
                confirm_password: confirmPassword
            };

            fetch(`${API_BASE_URL}/signup`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                signupBtn.disabled = false;
                signupText.style.display = 'inline';
                loading.style.display = 'none';

                if (data.success) {
                    // Save token and user info
                    localStorage.setItem('xiaoice_access_token', data.data.access_token);
                    localStorage.setItem('xiaoice_user', JSON.stringify(data.data.user));
                    localStorage.setItem('xiaoice_loggedIn', 'true');

                    showSuccess('註冊成功！正在重定向...');

                    // Redirect to main page
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError(data.error || '註冊失敗，請重試');
                }
            })
            .catch(error => {
                signupBtn.disabled = false;
                signupText.style.display = 'inline';
                loading.style.display = 'none';
                console.error('Error:', error);
                showError('網絡錯誤，請檢查後端是否運行');
            });
        }

        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleSocialSignup(provider) {
            const messages = {
                'google': '正在跳轉至 Google 註冊...',
                'github': '正在跳轉至 GitHub 註冊...',
                'wechat': '正在跳轉至微信註冊...'
            };

            showSuccess(messages[provider] || '正在處理註冊...');

            // In production, implement actual OAuth flow
            setTimeout(() => {
                alert(`${provider.toUpperCase()} 註冊功能將在生產環境中實現`);
            }, 1500);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';

            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
