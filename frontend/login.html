<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #667eea 100%);
            background-size: 200% 200%;
            animation: gradient 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 90%;
            padding: 50px 40px;
            animation: slideIn 0.6s ease-out;
            max-height: 90vh;
            overflow-y: auto;
            margin: 20px auto;
        }

        /* Custom scrollbar styling */
        .login-container::-webkit-scrollbar {
            width: 8px;
        }

        .login-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .login-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        .login-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3a8a 100%);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            color: #666;
            cursor: pointer;
            margin: 0;
        }

        .remember-forgot input[type="checkbox"] {
            margin-right: 6px;
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #667eea;
        }

        .remember-forgot a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #764ba2;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.6);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #ccc;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            margin: 0 15px;
            font-size: 13px;
            color: #999;
        }

        .social-login {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .signup-link {
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #764ba2;
        }

        .error-message {
            display: none;
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            font-size: 13px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            display: none;
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
            font-size: 13px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-container {
                padding: 35px 25px;
                max-width: 100%;
                max-height: 95vh;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .logo {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🤖</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">郵箱或用戶名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="email" name="email" placeholder="輸入郵箱或用戶名" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="輸入密碼" required>
                </div>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox" id="remember" name="remember">
                    記住我
                </label>
                <a href="forgot-password.html">忘記密碼？</a>
            </div>

            <button type="submit" class="login-btn">
                <span id="loginText">登入</span>
                <div class="loading" id="loading">
                    <span class="spinner"></span>加載中...
                </div>
            </button>
        </form>

        <div class="signup-link">
            還沒有帳戶？<a href="signup.html" onclick="goToSignup(event)">立即註冊</a>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:5000/api';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Load saved email if "Remember me" was checked
            const savedEmail = localStorage.getItem('xiaoice_email');
            const remember = localStorage.getItem('xiaoice_remember');
            
            if (savedEmail && remember === 'true') {
                document.getElementById('email').value = savedEmail;
                document.getElementById('remember').checked = true;
            }

            // Add language support - check localStorage for user preference
            const savedLanguage = localStorage.getItem('xiaoice_language') || 'zh-CN';
            if (savedLanguage === 'en') {
                switchLoginLanguage('en');
            } else if (savedLanguage === 'zh-TW') {
                switchLoginLanguage('zh-TW');
            }
        });

        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.querySelector('.login-btn');
            const loginText = document.getElementById('loginText');
            const loading = document.getElementById('loading');

            // Reset messages
            errorMessage.style.display = 'none';
            errorMessage.textContent = '';

            // Validation
            if (!email) {
                showError('請輸入郵箱或用戶名');
                return;
            }

            if (!password) {
                showError('請輸入密碼');
                return;
            }

            if (password.length < 6) {
                showError('密碼長度不少於 6 個字符');
                return;
            }

            // Simulate loading
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            loading.style.display = 'block';

            // Call API
            callLoginAPI(email, password, remember, loginBtn, loginText, loading);
        }

        function callLoginAPI(email, password, remember, loginBtn, loginText, loading) {
            const payload = {
                email: email,
                password: password
            };

            fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                loginBtn.disabled = false;
                loginText.style.display = 'inline';
                loading.style.display = 'none';

                if (data.success) {
                    // Save preferences
                    if (remember) {
                        localStorage.setItem('xiaoice_email', email);
                        localStorage.setItem('xiaoice_remember', 'true');
                    } else {
                        localStorage.removeItem('xiaoice_email');
                        localStorage.removeItem('xiaoice_remember');
                    }

                    // Store login info
                    localStorage.setItem('xiaoice_access_token', data.data.access_token);
                    localStorage.setItem('xiaoice_user', JSON.stringify(data.data.user));
                    localStorage.setItem('xiaoice_loggedIn', 'true');

                    showSuccess('登入成功！正在重定向...');

                    // Redirect to main page
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError(data.error || '登入失敗，請重試');
                }
            })
            .catch(error => {
                loginBtn.disabled = false;
                loginText.style.display = 'inline';
                loading.style.display = 'none';
                console.error('Error:', error);
                showError('網絡錯誤，請檢查後端是否運行');
            });
        }



            showSuccess(messages[provider] || '正在處理登入...');

            // In production, implement actual OAuth flow
            setTimeout(() => {
                alert(`${provider.toUpperCase()} 登入功能將在生產環境中實現`);
            }, 1500);
        

        function goToSignup(event) {
            if (event) event.preventDefault();
            window.location.href = 'signup.html';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function switchLoginLanguage(lang) {
            const translations = {
                'zh-CN': {
                    title: '郵箱或用戶名',
                    emailPlaceholder: '輸入郵箱或用戶名',
                    passwordLabel: '密碼',
                    passwordPlaceholder: '輸入密碼',
                    loginBtn: '登入',
                    remember: '記住我',
                    forgot: '忘記密碼？',
                    signup: '立即註冊',
                    signupText: '還沒有帳戶？',
                    error: {
                        noEmail: '請輸入郵箱或用戶名',
                        noPassword: '請輸入密碼',
                        shortPassword: '密碼長度不少於 6 個字符'
                    }
                },
                'zh-TW': {
                    title: '郵箱或用戶名',
                    emailPlaceholder: '輸入郵箱或用戶名',
                    passwordLabel: '密碼',
                    passwordPlaceholder: '輸入密碼',
                    loginBtn: '登入',
                    remember: '記住我',
                    forgot: '忘記密碼？',
                    signup: '立即註冊',
                    signupText: '還沒有帳戶？',
                    error: {
                        noEmail: '請輸入郵箱或用戶名',
                        noPassword: '請輸入密碼',
                        shortPassword: '密碼長度不少於 6 個字符'
                    }
                },
                'en': {
                    title: 'Email or Username',
                    emailPlaceholder: 'Enter email or username',
                    passwordLabel: 'Password',
                    passwordPlaceholder: 'Enter password',
                    loginBtn: 'Login',
                    remember: 'Remember me',
                    forgot: 'Forgot password?',
                    signup: 'Sign up now',
                    signupText: "Don't have an account?",
                    error: {
                        noEmail: 'Please enter email or username',
                        noPassword: 'Please enter password',
                        shortPassword: 'Password must be at least 6 characters'
                    }
                }
            };

            const t = translations[lang] || translations['zh-CN'];

            document.querySelector('label[for="email"]').textContent = t.title;
            document.getElementById('email').placeholder = t.emailPlaceholder;
            document.querySelector('label[for="password"]').textContent = t.passwordLabel;
            document.getElementById('password').placeholder = t.passwordPlaceholder;
            document.querySelector('label').textContent = t.remember;
            document.querySelector('.remember-forgot a').textContent = t.forgot;
            document.querySelector('.signup-link').innerHTML = `${t.signupText}<a href="#signup" onclick="goToSignup()">${t.signup}</a>`;
        }
    </script>
</body>
</html>
