<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天盒子 - Chatbox</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // 檢查用戶是否已登入
        (function() {
            const isLoggedIn = localStorage.getItem('xiaoice_loggedIn') === 'true';
            const hasToken = localStorage.getItem('xiaoice_access_token');
            
            if (!isLoggedIn || !hasToken) {
                // 未登入，重定向到登入頁面
                window.location.href = '/login.html';
            }
        })();
    </script>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-comment"></i>
            <h2>聊天盒子</h2>
        </div>        
        <div class="sidebar-footer">
            <a href="scrollbar-test.html" target="_blank" style="display: block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 10px; text-decoration: none; font-weight: bold;">
                🔍 测试滚动条
            </a>
            <button class="sidebar-btn" id="newChat"><i class="fas fa-plus"></i> 新对话</button>
            <button class="sidebar-btn" id="newImages"><i class="fas fa-image"></i> 新图像</button>
            <button class="sidebar-btn" id="settings"><i class="fas fa-cog"></i> 设置</button>
            <div class="version">关于 1.3.8i</div>
        </div>
    </div>
    
    <div id="main-content">
        <!-- Language Switcher Bar -->
        <div id="language-bar">
            <div class="language-label">
                <i class="fas fa-globe"></i>
                <span>语言 / Language:</span>
            </div>
            <div class="language-options">
                <button class="lang-btn active" data-lang="zh-CN">简体中文</button>
                <button class="lang-btn" data-lang="zh-TW">繁體中文</button>
                <button class="lang-btn" data-lang="en">English</button>
            </div>
            <a href="demo.html" class="page-switch-btn" title="查看功能展示 / View Demo">
                <i class="fas fa-info-circle"></i> 功能展示
            </a>
        </div>
        
        <div id="chat-header">
            <div class="chat-title">
                <i class="fas fa-comment"></i>
                <span>聊天盒子</span>
            </div>
            <div class="chat-info">
                <span id="userGreeting">您好，GPT-4o</span>
                <i class="fas fa-edit"></i>
            </div>
            <div class="chat-actions">
                <button class="icon-btn"><i class="fas fa-search"></i></button>
                <div class="dropdown-menu-trigger">
                    <button class="icon-btn" id="userMenuBtn"><i class="fas fa-user-circle"></i></button>
                    <div class="dropdown-menu" id="userDropdown">
                        <div class="user-info-display">
                            <i class="fas fa-user-circle"></i>
                            <span id="displayUserEmail">用户</span>
                        </div>
                        <hr>
                        <button class="dropdown-item" onclick="openSettings()">
                            <i class="fas fa-cog"></i> 設置
                        </button>
                        <button class="dropdown-item" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> 登出
                        </button>
                    </div>
                </div>
                <button class="icon-btn"><i class="fas fa-ellipsis-h"></i></button>
            </div>
        </div>
        
        <div id="messages">
            <div class="bot-message-container">
                <div class="avatar bot-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <p>您好！我是您的智能助手。我可以通过回答您的问题来帮助您。您也可以问我任何问题。</p>
                </div>
            </div>
        </div>
        
        <div id="input-container">
            <div class="input-toolbar">
                <button class="toolbar-btn" title="附加文件"><i class="fas fa-paperclip"></i></button>
                <button class="toolbar-btn" id="imageRecognitionBtn" title="图像识别"><i class="fas fa-image"></i></button>
                <button class="toolbar-btn" id="emojiBtn" title="表情符号"><i class="fas fa-smile"></i></button>
                <button class="toolbar-btn" title="语音输入"><i class="fas fa-microphone"></i></button>
                <button class="toolbar-btn" title="代码块"><i class="fas fa-code"></i></button>
                <button class="toolbar-btn" title="插入表格"><i class="fas fa-table"></i></button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="在这里输入您的问题...">
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <button id="sendButton"><i class="fas fa-paper-plane"></i></button>
            </div>
            
            <!-- Emoji Picker -->
            <div id="emojiPicker" class="emoji-picker" style="display: none;">
                <div class="emoji-header">
                    <span class="emoji-tab active" data-category="smileys">😊</span>
                    <span class="emoji-tab" data-category="gestures">👋</span>
                    <span class="emoji-tab" data-category="animals">🐱</span>
                    <span class="emoji-tab" data-category="food">🍕</span>
                    <span class="emoji-tab" data-category="activities">⚽</span>
                    <span class="emoji-tab" data-category="travel">✈️</span>
                    <span class="emoji-tab" data-category="objects">💡</span>
                    <span class="emoji-tab" data-category="symbols">❤️</span>
                </div>
                <div class="emoji-content" id="emojiContent"></div>
            </div>
        </div>
    </div>
    
    <!-- Avatar Settings Modal -->
    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>设置 / Settings</h2>
            
            <!-- Tab Navigation -->
            <div class="settings-tabs">
                <button class="settings-tab active" data-tab="avatar">
                    <i class="fas fa-user-circle"></i> 头像 / Avatar
                </button>
                <button class="settings-tab" data-tab="background">
                    <i class="fas fa-palette"></i> 背景 / Background
                </button>
            </div>
            
            <!-- Avatar Settings Tab -->
            <div class="settings-content active" id="avatarTab">
                <div class="avatar-settings">
                    <div class="avatar-section">
                        <h3>您的头像 / Your Avatar</h3>
                        <div class="avatar-preview" id="userAvatarPreview">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="file" id="userAvatarInput" accept="image/*" style="display: none;">
                        <button class="upload-btn" onclick="document.getElementById('userAvatarInput').click()">
                            <i class="fas fa-upload"></i> 上传头像 / Upload Avatar
                        </button>
                        <button class="clear-btn" id="clearUserAvatar">
                            <i class="fas fa-times"></i> 清除 / Clear
                        </button>
                    </div>
                    
                    <div class="avatar-section">
                        <h3>机器人头像 / Bot Avatar</h3>
                        <div class="avatar-preview" id="botAvatarPreview">
                            <i class="fas fa-robot"></i>
                        </div>
                        <input type="file" id="botAvatarInput" accept="image/*" style="display: none;">
                        <button class="upload-btn" onclick="document.getElementById('botAvatarInput').click()">
                            <i class="fas fa-upload"></i> 上传头像 / Upload Avatar
                        </button>
                        <button class="clear-btn" id="clearBotAvatar">
                            <i class="fas fa-times"></i> 清除 / Clear
                        </button>
                    </div>
                </div>
            </div>
            
    <script src="script.js"></script>
</body>
</html>
