version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: xiaoice-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: xiaoice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xiaoice-network

  # pgAdmin - PostgreSQL Management Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: xiaoice-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xiaoice-network
    restart: unless-stopped

  # Flask Application
  flask:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: xiaoice-flask
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --threads 2 --worker-class gthread --timeout 120 'run:app'
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SQLALCHEMY_DATABASE_URI=postgresql://postgres:password@postgres:5432/xiaoice
      - FLASK_APP=run.py
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    networks:
      - xiaoice-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  xiaoice-network:
    driver: bridge
