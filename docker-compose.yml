version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: xiaoice_postgres
    environment:
      POSTGRES_DB: xiaoice
      POSTGRES_USER: xiaoice_user
      POSTGRES_PASSWORD: xiaoice_password
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xiaoice_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaoice_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: xiaoice_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "0.0.0.0:5050:80"
    depends_on:
      - postgres
    networks:
      - xiaoice_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_servers.xml:/pgadmin4/servers.xml

volumes:
  postgres_data:
  pgadmin_data:

networks:
  xiaoice_network:
    driver: bridge
